<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار علوم الأرض التفاعلي — أ. خالد عادل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F1E7; --ink:#2B2620; --ink-soft:#6B6255; --paper:#FFFDF8; --line:#D9CFBC;
    --good:#2F7A55; --good-t:#E7F3EB;
    --bad:#C1502E; --bad-t:#FBEAE1;
    --accent:#4C6B85; --accent-t:#E9EFF3;
    --edit:#7C5CBF; --edit-t:#F1ECFA;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Almarai',sans-serif;-webkit-font-smoothing:antialiased;}
  body{background-image:radial-gradient(circle at 1px 1px, rgba(43,38,32,0.06) 1px, transparent 0);background-size:22px 22px;}
  .page{max-width:760px;margin:0 auto;padding:20px 18px 70px;}

  /* ===== master toolbar ===== */
  #gearBtn{
    position: fixed; top: 14px; left: 14px; z-index: 50;
    width: 34px; height: 34px; border-radius: 50%;
    background: transparent; border: 1px solid transparent;
    font-size: 16px; opacity: 0.35; cursor: pointer;
    transition: opacity .15s ease, background .15s ease, border-color .15s ease;
  }
  #gearBtn:hover{ opacity: 1; background: var(--paper); border-color: var(--line); }
  .toolbar{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .toolbar button{font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;border-radius:999px;border:1.5px solid var(--line);background:var(--paper);padding:9px 16px;cursor:pointer;}
  .toolbar button:hover{background:var(--accent-t);}
  .toolbar button.on{background:var(--edit);border-color:var(--edit);color:#fff;}
  .toolbar button.save{background:var(--good);border-color:var(--good);color:#fff;}
  .autosave-note{text-align:center;font-size:11.5px;color:var(--ink-soft);margin-bottom:10px;}

  /* ===== logo / master header ===== */
  .masterhead{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:6px;}
  .logo-slot{width:84px;height:84px;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .logo-slot img{max-width:100%;max-height:100%;object-fit:contain;}
  .logo-slot.empty{border:1.5px dashed var(--line);color:var(--ink-soft);font-size:11px;text-align:center;cursor:pointer;padding:4px;}
  .logo-slot.editable{cursor:pointer;position:relative;}
  .logo-controls{display:flex;gap:6px;margin-top:2px;}
  .logo-controls button{font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 10px;cursor:pointer;}

  header{text-align:center;margin-bottom:20px;}
  .eyebrow{display:inline-block;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;background:var(--paper);border:1px solid var(--line);padding:6px 16px;border-radius:999px;margin-bottom:14px;}
  h1{font-family:'Cairo',sans-serif;font-weight:800;font-size:clamp(24px,5vw,34px);margin:0 0 6px;}
  header p{color:var(--ink-soft);font-size:14.5px;max-width:520px;margin:0 auto;line-height:1.8;}

  .tabs{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:24px 0 8px;}
  .tab{font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:10px 18px;cursor:pointer;text-align:center;min-width:110px;transition:transform .12s ease;position:relative;}
  .tab:hover{transform:translateY(-2px);}
  .tab.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-t) inset;}
  .tab .badge{display:block;font-family:'Almarai',sans-serif;font-weight:400;font-size:12px;color:var(--ink-soft);margin-top:3px;}
  .tab.addtab{border-style:dashed;color:var(--ink-soft);}
  .tab .delmodel{position:absolute;top:-8px;left:-8px;background:var(--bad);color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;line-height:20px;text-align:center;cursor:pointer;}
  .tab-title-edit{width:100%;text-align:center;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;border:none;background:transparent;outline:none;}

  .scorebar{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0 26px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;}
  .scorebar .track{width:180px;height:9px;border-radius:999px;background:var(--line);overflow:hidden;}
  .scorebar .fill{height:100%;background:var(--accent);width:0%;transition:width .3s ease;}

  .qcard{background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;position:relative;}
  .qcard.editing{border-color:var(--edit);}
  .qcard .qnum{font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;color:var(--accent);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .qcard .qtext{font-size:15.5px;line-height:1.85;font-weight:700;margin-bottom:12px;}
  .qcard img{max-width:100%;border-radius:10px;border:1px solid var(--line);display:block;margin:0 auto 14px;}

  .opt{display:block;width:100%;text-align:right;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:9px;font-family:'Almarai',sans-serif;font-weight:700;font-size:14.5px;color:var(--ink);cursor:pointer;transition:background .15s ease,border-color .15s ease,transform .08s ease;}
  .opt:hover:not(.locked){background:var(--accent-t);border-color:var(--accent);}
  .opt:active:not(.locked){transform:scale(.99);}
  .opt.correct{background:var(--good-t);border-color:var(--good);color:var(--good);}
  .opt.wrong{background:var(--bad-t);border-color:var(--bad);color:var(--bad);}
  .opt.selected{background:var(--accent-t);border-color:var(--accent);}
  .opt.locked{cursor:default;}
  .opt .mark{font-weight:800;margin-left:6px;}
  .explain-box{background:var(--edit-t);border:1px dashed var(--edit);border-radius:10px;padding:10px 12px;margin-top:6px;font-size:13.5px;line-height:1.8;}

  textarea.essay{width:100%;min-height:70px;border-radius:10px;border:1.5px solid var(--line);padding:10px 12px;font-family:'Almarai',sans-serif;font-size:14px;resize:vertical;margin-bottom:8px;}
  .essay-part{margin-bottom:16px;}
  .essay-prompt{font-weight:700;font-size:14px;margin-bottom:6px;}
  .btn{font-family:'Cairo',sans-serif;font-weight:700;font-size:13.5px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink);padding:8px 16px;cursor:pointer;}
  .btn:hover{background:var(--accent-t);}
  .btn.danger{border-color:var(--bad);color:var(--bad);}
  .btn.danger:hover{background:var(--bad-t);}
  .btn.small{font-size:12px;padding:5px 12px;}
  .model-answer{display:none;background:var(--accent-t);border:1px dashed var(--accent);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13.5px;line-height:1.8;}
  .model-answer.show{display:block;}
  .note{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .controls{display:flex;justify-content:center;margin-top:8px;}
  .finish-btn{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;border-radius:999px;border:none;background:var(--accent);color:#fff;padding:13px 30px;cursor:pointer;}
  .finish-btn:hover{opacity:.92;}

  .result{display:none;text-align:center;background:var(--paper);border:1.5px dashed var(--line);border-radius:18px;padding:26px 20px;margin-top:20px;}
  .result.show{display:block;animation:fadeUp .35s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .result .big{font-family:'Cairo',sans-serif;font-weight:800;font-size:30px;color:var(--accent);}
  .result p{color:var(--ink-soft);font-size:14px;margin:6px 0 16px;}

  footer{text-align:center;margin-top:36px;color:var(--ink-soft);font-size:12px;}

  /* ===== edit-mode form styles ===== */
  .edit-field{width:100%;border:1.5px solid var(--edit);border-radius:10px;padding:9px 12px;font-family:'Almarai',sans-serif;font-size:14.5px;font-weight:700;margin-bottom:10px;resize:vertical;background:#fff;}
  .edit-opt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .edit-opt-row input[type=text]{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Almarai',sans-serif;font-size:14px;}
  .edit-opt-row input[type=radio]{width:18px;height:18px;accent-color:var(--good);}
  .edit-opt-row .rm{color:var(--bad);cursor:pointer;font-weight:800;font-size:16px;padding:0 4px;}
  .imgbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .addq-card{background:var(--edit-t);border:1.5px dashed var(--edit);border-radius:16px;padding:16px;margin-bottom:16px;}
  .addq-card select{font-family:'Cairo',sans-serif;font-weight:700;border-radius:8px;border:1.5px solid var(--line);padding:7px 10px;margin-bottom:10px;}
  .addq-toggle{display:block;width:100%;text-align:center;font-family:'Cairo',sans-serif;font-weight:800;font-size:14.5px;background:var(--edit-t);border:1.5px dashed var(--edit);color:var(--edit);border-radius:16px;padding:14px;cursor:pointer;margin-bottom:16px;}
  .field-label{font-family:'Cairo',sans-serif;font-weight:700;font-size:12.5px;color:var(--ink-soft);margin-bottom:4px;display:block;}

  .timerbar{text-align:center;font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;margin:14px 0;padding:10px;border-radius:12px;background:var(--paper);border:1.5px solid var(--line);color:var(--accent);}
  .timerbar.warn{color:var(--bad);border-color:var(--bad);background:var(--bad-t);}

  .model-settings{background:var(--edit-t);border:1.5px dashed var(--edit);border-radius:16px;padding:16px;margin-bottom:16px;}
  .model-settings .row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .model-settings label{font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;}
  .model-settings input[type=number]{width:80px;border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;font-family:'Almarai',sans-serif;}
  .model-settings select{border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;font-family:'Almarai',sans-serif;}
</style>
</head>
<body>
<div class="page">

  <button id="gearBtn" title="إعدادات المعلّم">⚙️</button>

  <div class="toolbar" id="teacherToolbar" style="display:none;">
    <button id="editToggleBtn">✓ وضع التعديل شغّال</button>
    <button id="saveBtn" class="save">💾 تنزيل نسخة محدّثة</button>
    <button id="shareBtn">📤 مشاركة الملف</button>
  </div>
  <div class="toolbar" id="settingsBar" style="display:none;">
    <button id="changePwBtn">🔑 تغيير باسورد التعديل</button>
    <button id="changePhoneBtn">📱 تغيير رقم الواتساب</button>
    <button id="clearDraftBtn">🗑 مسح المسودة المحفوظة</button>
  </div>
  <div id="autosaveNote" class="autosave-note" style="display:none;"></div>

  <div class="masterhead" id="masterhead"></div>

  <header>
    <span class="eyebrow">علوم الأرض · أ. خالد عادل</span>
    <h1>اختبار تفاعلي — النماذج الاسترشادية</h1>
    <p>اختار إجابتك وهتعرف صح ولا غلط فورًا. في الآخر هتلاقي درجتك النهائية لكل نموذج.</p>
  </header>

  <div class="tabs" id="tabs"></div>
  <div id="timerBar" class="timerbar" style="display:none;"></div>
  <div class="scorebar">
    <div class="track"><div class="fill" id="fill"></div></div>
    <span id="scoreText"></span>
  </div>

  <div id="quizArea"></div>

  <div class="controls"><button class="finish-btn" id="finishBtn">إظهار النتيجة النهائية</button></div>

  <div class="result" id="result">
    <div class="big" id="resultBig"></div>
    <p id="resultSub"></p>
    <button class="btn" id="reviewBtn">مراجعة الإجابات الخطأ</button>
    <div style="margin-top:14px;" id="waSection">
      <div id="studentNameDisplay" style="display:none;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;"></div>
      <input type="text" id="studentName" placeholder="اكتب اسمك هنا..." style="width:100%;max-width:280px;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Almarai',sans-serif;font-size:14px;margin-bottom:10px;">
      <br>
      <button class="btn" id="sendWaBtn" style="background:#25D366;color:#fff;border-color:#25D366;">📤 إرسال النتيجة للمدرّس عبر واتساب</button>
      <div class="note" id="waAutoNote" style="display:none;">تم فتح واتساب تلقائيًا — لو ملقيتش نافذة واتساب فتحت، دوس الزرار فوق يدويًا.</div>
    </div>
  </div>

  <footer>اختبار تفاعلي · اتفتح في المتصفّح</footer>
</div>

/* ---------------- engine state ---------------- */
let currentModel = 0;
let editMode = false;
let state = MODELS.map(m => ({ answers: new Array(m.questions.length).fill(null), finished:false, startedAt:null, gatePassed:false, studentName:'', studentPhone:'', studentCode:'' }));

const PRISTINE_HTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

const tabsEl = document.getElementById('tabs');
const quizArea = document.getElementById('quizArea');
const fillEl = document.getElementById('fill');
const scoreTextEl = document.getElementById('scoreText');
const resultEl = document.getElementById('result');
const masterhead = document.getElementById('masterhead');

function freshModelState(m){
  return { answers: new Array(m.questions.length).fill(null), finished:false, startedAt:null, gatePassed:false, studentName:'', studentPhone:'', studentCode:'' };
}
function syncState(){
  state = MODELS.map((m,i) => {
    if(state[i] && state[i].answers.length===m.questions.length) return state[i];
    return freshModelState(m);
  });
  if(currentModel >= MODELS.length) currentModel = Math.max(0, MODELS.length-1);
}

function mcqCount(idx){ return MODELS[idx].questions.filter(q=>q.type==='mcq').length; }
function mcqCorrectCount(idx){
  const m = MODELS[idx], st = state[idx];
  let c=0;
  m.questions.forEach((q,i)=>{ if(q.type==='mcq' && st.answers[i]===q.correct) c++; });
  return c;
}
function mcqAnsweredCount(idx){
  const m = MODELS[idx], st = state[idx];
  let c=0;
  m.questions.forEach((q,i)=>{ if(q.type==='mcq' && st.answers[i]!==null) c++; });
  return c;
}

function pickImage(cb){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = ()=>{
    const file = inp.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=> cb(reader.result);
    reader.readAsDataURL(file);
  };
  inp.click();
}

/* ---------------- password gate ---------------- */
let editUnlocked = false;
async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function tryUnlockEdit(){
  if(editUnlocked) return true;
  const pw = prompt('اكتب باسورد وضع التعديل:');
  if(pw === null) return false;
  const hash = await sha256Hex(pw);
  if(hash === EDIT_PASSWORD_HASH){
    editUnlocked = true;
    return true;
  }
  alert('باسورد غلط.');
  return false;
}
function renderLogo(){
  masterhead.innerHTML = '';
  const slot = document.createElement('div');
  slot.className = 'logo-slot' + (LOGO ? '' : ' empty') + (editMode ? ' editable' : '');
  if(LOGO){
    const img = document.createElement('img');
    img.src = LOGO;
    slot.appendChild(img);
  } else if(editMode){
    slot.textContent = '➕ إضافة لوجو';
  }
  if(editMode){
    slot.onclick = ()=> pickImage(data => { window.LOGO_OVERRIDE = data; setLogo(data); });
  }
  masterhead.appendChild(slot);
  if(editMode && LOGO){
    const ctrl = document.createElement('div');
    ctrl.className = 'logo-controls';
    const rm = document.createElement('button');
    rm.textContent = '🗑 حذف اللوجو';
    rm.onclick = (e)=>{ e.stopPropagation(); setLogo(null); };
    ctrl.appendChild(rm);
    masterhead.appendChild(ctrl);
  }
}
function setLogo(data){
  LOGO = data;
  renderLogo();
}

/* ---------------- tabs ---------------- */
function buildTabs(){
  tabsEl.innerHTML='';
  MODELS.forEach((m,i)=>{
    const t = document.createElement('div');
    t.className = 'tab' + (i===currentModel ? ' active':'');
    const total = mcqCount(i);

    if(editMode){
      const del = document.createElement('div');
      del.className = 'delmodel';
      del.textContent = '×';
      del.title = 'حذف النموذج';
      del.onclick = (e)=>{
        e.stopPropagation();
        if(MODELS.length<=1){ alert('لازم يفضل نموذج واحد على الأقل.'); return; }
        if(confirm(`متأكد إنك عايز تمسح "${m.title}"؟`)){
          MODELS.splice(i,1);
          syncState();
          renderAll();
        }
      };
      t.appendChild(del);

      const inp = document.createElement('input');
      inp.className = 'tab-title-edit';
      inp.value = m.title;
      inp.onclick = (e)=> { if(i===currentModel) e.stopPropagation(); };
      inp.oninput = ()=> { m.title = inp.value; };
      t.appendChild(inp);

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = total + ' سؤال';
      t.appendChild(badge);
      t.onclick = ()=> loadModel(i);
    } else {
      t.innerHTML = `${m.title}<span class="badge">${mcqCorrectCount(i)}/${total}</span>`;
      t.onclick = ()=> loadModel(i);
    }
    tabsEl.appendChild(t);
  });

  if(editMode){
    const addT = document.createElement('div');
    addT.className = 'tab addtab';
    addT.textContent = '+ نموذج جديد';
    addT.onclick = ()=>{
      MODELS.push({ id:'model'+Date.now(), title:'نموذج جديد', questions:[] });
      syncState();
      loadModel(MODELS.length-1);
    };
    tabsEl.appendChild(addT);
  }
}

/* ---------------- scorebar ---------------- */
function updateScorebar(){
  const total = mcqCount(currentModel) || 1;
  const answered = mcqAnsweredCount(currentModel);
  const correct = mcqCorrectCount(currentModel);
  fillEl.style.width = (answered/total*100)+'%';
  scoreTextEl.textContent = editMode ? 'وضع التعديل شغّال — الدرجات متوقفة مؤقتًا' : `أجبت ${answered}/${total} — صح ${correct}`;
}

  num.className = 'qnum';
  num.innerHTML = `<span>سؤال ${qIndex+1}</span>`;
  card.appendChild(num);

  const text = document.createElement('div');
  text.className = 'qtext';
  text.textContent = q.text;
  card.appendChild(text);

  if(q.image){
    const img = document.createElement('img');
    img.src = q.image;
    card.appendChild(img);
  }

  if(q.type === 'mcq'){
    const instant = m.instantFeedback !== false;
    const answered = st.answers[qIndex];
    const revealed = instant ? (answered!==null) : !!st.finished;
    const locked = instant ? (answered!==null) : !!st.finished;
    q.options.forEach((opt, oi)=>{
      const b = document.createElement('button');
      b.className = 'opt' + (locked ? ' locked':'');
      if(revealed){
        if(oi===q.correct) b.classList.add('correct');
        else if(oi===answered) b.classList.add('wrong');
      } else if(!instant && oi===answered){
        b.classList.add('selected');
      }
      b.innerHTML = opt + (revealed && oi===q.correct ? ' <span class="mark">✓</span>' : (revealed && oi===answered ? ' <span class="mark">✗</span>' : ''));
      b.onclick = ()=>{
        if(locked) return;
        st.answers[qIndex] = oi;
        renderAll();
      };
      card.appendChild(b);
    });
    if(revealed && q.explanation){
      const exp = document.createElement('div');
      exp.className = 'explain-box';
      exp.innerHTML = '<b>💡 التفسير:</b> ' + q.explanation;
      card.appendChild(exp);
    }
  } else if(q.type === 'essay'){
    q.parts.forEach((p)=>{
      const wrap = document.createElement('div');
      wrap.className = 'essay-part';
      const pr = document.createElement('div');
      pr.className = 'essay-prompt';
      pr.textContent = p.prompt;
      wrap.appendChild(pr);
      const ta = document.createElement('textarea');
      ta.className = 'essay';
      ta.placeholder = 'اكتب إجابتك هنا...';
      wrap.appendChild(ta);
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = 'إظهار الإجابة النموذجية';
      const ans = document.createElement('div');
      ans.className = 'model-answer';
      ans.textContent = p.model;
      btn.onclick = ()=> ans.classList.toggle('show');
      wrap.appendChild(btn);
      wrap.appendChild(ans);
      card.appendChild(wrap);
    });
    const note = document.createElement('div');
    note.className = 'note';
    note.textContent = 'هذا السؤال مقالي ولا يُحتسب ضمن الدرجة الآلية — قيّم نفسك بمقارنة إجابتك بالنموذج.';
    card.appendChild(note);
  }

  return card;
}

/* ---------------- timer ---------------- */
let timerInterval = null;
function stopTimerLoop(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
function timerTick(){
  const m = MODELS[currentModel];
  const st = state[currentModel];
  const bar = document.getElementById('timerBar');
  if(!m || editMode || !m.timeLimit || m.timeLimit<=0 || !st.startedAt || st.finished){
    bar.style.display = 'none';
    return;
  }
  const totalSec = m.timeLimit*60;
  const elapsed = Math.floor((Date.now()-st.startedAt)/1000);
  const remaining = Math.max(0, totalSec-elapsed);
  const mm = String(Math.floor(remaining/60)).padStart(2,'0');
  const ss = String(remaining%60).padStart(2,'0');
  bar.style.display = 'block';
  bar.textContent = `⏱ الوقت المتبقي: ${mm}:${ss}`;
  bar.classList.toggle('warn', remaining<=60);
  if(remaining<=0 && !st.finished){
    finishModel(true);
  }
}

function ensureTimerStarted(){
  const m = MODELS[currentModel];
  const st = state[currentModel];
  if(!editMode && m && m.timeLimit>0 && !st.startedAt && !st.finished){
    st.startedAt = Date.now();
  }
}

/* ---------------- exam availability window ---------------- */
function windowStatus(m){
  if(!m.windowEnabled) return 'open';
  const now = Date.now();
  if(m.windowStart){
    const startT = new Date(m.windowStart).getTime();
    if(!isNaN(startT) && now < startT) return 'before';
  }
  if(m.windowEnd){
    const endT = new Date(m.windowEnd).getTime();
    if(!isNaN(endT) && now > endT) return 'closed';
  }
  return 'open';
}

    nameInp.style.cssText = fieldStyle;
    card.appendChild(nameInp);
    card.appendChild(document.createElement('br'));
  }
  if(m.gatePhone){
    phoneInp = document.createElement('input');
    phoneInp.type = 'tel';
    phoneInp.placeholder = 'رقم الهاتف...';
    phoneInp.style.cssText = fieldStyle;
    card.appendChild(phoneInp);
    card.appendChild(document.createElement('br'));
  }
  if(m.gateCode){
    codeInp = document.createElement('input');
    codeInp.type = 'text';
    codeInp.placeholder = 'الكود...';
    codeInp.style.cssText = fieldStyle;
    card.appendChild(codeInp);
    card.appendChild(document.createElement('br'));
  }

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'finish-btn';
  confirmBtn.textContent = 'تأكيد والبدء';
  confirmBtn.onclick = ()=>{
    let nameVal = '', phoneVal = '', codeVal = '';
    if(nameInp){
      nameVal = nameInp.value.trim();
      const words = nameVal.split(/\s+/).filter(Boolean);
      if(words.length===0){ alert('من فضلك اكتب اسمك.'); return; }
      if(m.gateNameFull!==false && words.length<3){ alert('من فضلك اكتب اسمك الثلاثي كامل (٣ كلمات على الأقل).'); return; }
    }
    if(phoneInp){
      phoneVal = phoneInp.value.trim();
      if(phoneVal.replace(/\D/g,'').length<8){ alert('من فضلك اكتب رقم تليفون صحيح.'); return; }
    }
    if(codeInp){
      codeVal = codeInp.value.trim();
      if(!codeVal){ alert('من فضلك اكتب الكود.'); return; }
    }
    st.studentName = nameVal;
    st.studentPhone = phoneVal;
    st.studentCode = codeVal;
    st.gatePassed = true;
    renderAll();
  };
  card.appendChild(confirmBtn);

  return card;
}

/* ---------------- master render ---------------- */
function renderAll(){
  quizArea.innerHTML = '';
  const m = MODELS[currentModel];
  const st = state[currentModel];
  const wStatus = m ? windowStatus(m) : 'open';
  lastWindowStatus = wStatus;
  const windowLocked = m && !editMode && wStatus !== 'open';
  const gateActive = m && !editMode && !windowLocked && (m.gateName || m.gatePhone || m.gateCode) && st && !st.gatePassed;
  if(m){
    if(windowLocked){
      quizArea.appendChild(renderWindowMessage(wStatus, m));
    } else if(gateActive){
      quizArea.appendChild(renderGateForm(m, st));
    } else {
      if(editMode) quizArea.appendChild(renderModelSettings(m));
      m.questions.forEach((q,i)=> quizArea.appendChild(editMode ? renderQuestionEdit(q,i) : renderQuestionView(q,i)));
      if(editMode) quizArea.appendChild(renderAddQuestionForm());
    }
  }
  updateScorebar();
  buildTabs();
  renderLogo();
  document.querySelector('.scorebar').style.display = (gateActive || windowLocked) ? 'none' : 'flex';
  document.getElementById('finishBtn').style.display = (editMode || gateActive || windowLocked || (st && st.finished)) ? 'none' : 'inline-block';
  if(!editMode && !gateActive && !windowLocked) ensureTimerStarted();
  timerTick();
  resultEl.classList.remove('show');
  if(editMode) saveDraft();
}

function loadModel(i){
  currentModel = i;
  renderAll();
  window.scrollTo({top:0, behavior:'smooth'});
}
function windowTick(){
  timerTick();
  const m = MODELS[currentModel];
  if(!m || editMode) return;
  const s = windowStatus(m);
  if(s !== lastWindowStatus){
    lastWindowStatus = s;
    renderAll();
  }
}
if(!timerInterval) timerInterval = setInterval(windowTick, 1000);

/* ---------------- autosave (draft, local to this browser only) ---------------- */
const AUTOSAVE_KEY = 'geo_quiz_autosave_v1';
function saveDraft(){
  try{
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({MODELS, LOGO, EDIT_PASSWORD_HASH, TEACHER_WHATSAPP, savedAt: Date.now()}));
    const note = document.getElementById('autosaveNote');
    if(editMode){
      note.style.display = 'block';
      note.textContent = '💾 اتحفظت مسودة تلقائيًا في هذا المتصفح — ' + new Date().toLocaleTimeString('ar-EG');
    }
  }catch(e){
    const note = document.getElementById('autosaveNote');
    note.style.display = 'block';
    note.textContent = '⚠️ تعذّر الحفظ التلقائي (مساحة التخزين المحلي ممتلئة) — نزّل نسخة يدويًا بزرار "💾 تنزيل نسخة محدّثة".';
  }
}
function tryRestoreDraft(){
  try{
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if(!raw) return;
    const draft = JSON.parse(raw);
    if(!draft || !draft.MODELS) return;
    const when = draft.savedAt ? new Date(draft.savedAt).toLocaleString('ar-EG') : '';
    if(confirm('فيه مسودة محفوظة تلقائيًا في هذا المتصفح من ' + when + '. تحب تسترجعها؟')){
      MODELS.length = 0;
      draft.MODELS.forEach(m=>MODELS.push(m));
      LOGO = draft.LOGO ?? LOGO;
      EDIT_PASSWORD_HASH = draft.EDIT_PASSWORD_HASH ?? EDIT_PASSWORD_HASH;
      TEACHER_WHATSAPP = draft.TEACHER_WHATSAPP ?? TEACHER_WHATSAPP;
      syncState();
    }
  }catch(e){ /* ignore corrupt draft */ }
}
document.getElementById('clearDraftBtn').onclick = ()=>{
  if(confirm('مسح المسودة المحفوظة تلقائيًا من هذا المتصفح؟ (مش هيأثر على الملف نفسه)')){
    try{ localStorage.removeItem(AUTOSAVE_KEY); }catch(e){}
    document.getElementById('autosaveNote').style.display = 'none';
    alert('تم المسح.');
  }
};

/* ---------------- toolbar actions ---------------- */
document.getElementById('gearBtn').onclick = async ()=>{
  const ok = await tryUnlockEdit();
  if(!ok) return;
  tryRestoreDraft();
  document.getElementById('teacherToolbar').style.display = 'flex';
  document.getElementById('settingsBar').style.display = 'flex';
  editMode = true;
  document.getElementById('editToggleBtn').classList.add('on');
  document.getElementById('editToggleBtn').textContent = '✓ وضع التعديل شغّال';
  renderAll();
};

document.getElementById('editToggleBtn').onclick = ()=>{
  editMode = !editMode;
  document.getElementById('editToggleBtn').classList.toggle('on', editMode);
  document.getElementById('editToggleBtn').textContent = editMode ? '✓ وضع التعديل شغّال' : '👁 معاينة كطالب (اضغط للرجوع للتعديل)';
  renderAll();
};

document.getElementById('changePwBtn').onclick = async ()=>{
  const newPw = prompt('اكتب الباسورد الجديد لوضع التعديل:');
  if(!newPw) return;
  EDIT_PASSWORD_HASH = await sha256Hex(newPw);
  alert('تم تغيير الباسورد. متنساش تحفظ نسخة محدّثة عشان التغيير يتسجّل.');
};

document.getElementById('changePhoneBtn').onclick = ()=>{
  const newPhone = prompt('رقم الواتساب بالكود الدولي (بدون + أو مسافات)، مثال: 201064749818', TEACHER_WHATSAPP);
  if(!newPhone) return;
  TEACHER_WHATSAPP = newPhone.replace(/\D/g,'');
  alert('تم تغيير الرقم. متنساش تحفظ نسخة محدّثة عشان التغيير يتسجّل.');
};

let lastResult = null;
function finishModel(auto){
  const st = state[currentModel];
  const total = mcqCount(currentModel);
  const answered = mcqAnsweredCount(currentModel);
  if(!auto && answered < total){
    if(!confirm(`لسه مجاوبتش كل الأسئلة (${answered}/${total}). عايز تشوف النتيجة الحالية؟`)) return;
  }
  st.finished = true;
  renderAll();
  const correct = mcqCorrectCount(currentModel);
  document.getElementById('resultBig').textContent = `${correct} / ${total}`;
  const pct = total ? Math.round(correct/total*100) : 0;
  document.getElementById('resultSub').textContent = auto
    ? `خلص الوقت! نسبتك في ${MODELS[currentModel].title}: ${pct}%`
    : `نسبتك في ${MODELS[currentModel].title}: ${pct}%`;
  lastResult = { model: MODELS[currentModel].title, correct, total, pct };

  const nameDisplay = document.getElementById('studentNameDisplay');
  const nameInput = document.getElementById('studentName');
  const waAutoNote = document.getElementById('waAutoNote');
  if(st.gatePassed){
    nameDisplay.style.display = 'block';
    nameDisplay.textContent = '👤 ' + (st.studentName || 'بدون اسم') + (st.studentPhone ? ' — ' + st.studentPhone : '') + (st.studentCode ? ' — كود: ' + st.studentCode : '');
    nameInput.style.display = 'none';
  } else {
    nameDisplay.style.display = 'none';
    nameInput.style.display = 'inline-block';
  }
  waAutoNote.style.display = 'none';

  resultEl.classList.add('show');
  resultEl.scrollIntoView({behavior:'smooth', block:'center'});

  // Auto-send only works reliably when triggered directly from a real click (not a timer callback),
  // since browsers block window.open() calls that aren't tied to a user gesture.
  if(!auto){
    const opened = sendWhatsApp();
    if(opened) waAutoNote.style.display = 'block';
  }
}
document.getElementById('finishBtn').onclick = ()=> finishModel(false);

function sendWhatsApp(){
  if(!lastResult) return false;
  if(!TEACHER_WHATSAPP){ alert('رقم واتساب المدرّس مش متسجّل في الملف ده.'); return false; }
  const st = state[currentModel];
  const nameInput = document.getElementById('studentName');
  const name = st.studentName || (nameInput.value.trim() || 'طالب بدون اسم');
  const phoneLine = st.studentPhone ? `\nرقم الهاتف: ${st.studentPhone}` : '';
  const codeLine = st.studentCode ? `\nالكود: ${st.studentCode}` : '';
  const msg = `نتيجة اختبار علوم الأرض\nالاسم: ${name}${phoneLine}${codeLine}\nالنموذج: ${lastResult.model}\nالدرجة: ${lastResult.correct}/${lastResult.total} (${lastResult.pct}%)`;
  const url = `https://wa.me/${TEACHER_WHATSAPP}?text=${encodeURIComponent(msg)}`;
  const w = window.open(url, '_blank');
  return !!w;
}
document.getElementById('sendWaBtn').onclick = ()=> sendWhatsApp();



document.getElementById('reviewBtn').onclick = ()=>{
  const m = MODELS[currentModel], st = state[currentModel];
  const wrongEls = [];
  m.questions.forEach((q,i)=>{
    if(q.type==='mcq' && st.answers[i]!==null && st.answers[i]!==q.correct){
      wrongEls.push(quizArea.children[i]);
    }
  });
  if(wrongEls.length===0){ alert('مفيش أسئلة غلط — ممتاز! 🎉'); return; }
  wrongEls[0].scrollIntoView({behavior:'smooth', block:'center'});
};

/* ---------------- export / save updated copy ---------------- */
function buildExportHTML(){
  const scriptEl = document.getElementById('mainScript');
  const originalScriptText = scriptEl.textContent;
  const startMarker = '/*DATA_START*/';
  const endMarker = '/*DATA_END*/';
  const s = originalScriptText.indexOf(startMarker);
  const e = originalScriptText.indexOf(endMarker) + endMarker.length;
  if(s<0 || e<0) return null;
  const newDataBlock = startMarker + '\nconst MODELS = ' + JSON.stringify(MODELS) + ';\nlet LOGO = ' + JSON.stringify(LOGO) + ';\nlet EDIT_PASSWORD_HASH = ' + JSON.stringify(EDIT_PASSWORD_HASH) + ';\nlet TEACHER_WHATSAPP = ' + JSON.stringify(TEACHER_WHATSAPP) + ';\n' + endMarker;
  const newScriptText = originalScriptText.slice(0,s) + newDataBlock + originalScriptText.slice(e);
  return PRISTINE_HTML.replace(originalScriptText, newScriptText);
}

document.getElementById('saveBtn').onclick = ()=>{
  const out = buildExportHTML();
  if(!out){ alert('تعذّر إنشاء النسخة، حاول تاني.'); return; }
  const blob = new Blob([out], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geology_quiz_edited.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};

document.getElementById('shareBtn').onclick = async ()=>{
  const out = buildExportHTML();
  if(!out){ alert('تعذّر تجهيز الملف للمشاركة.'); return; }
  const blob = new Blob([out], {type:'text/html'});
  const file = new File([blob], 'اختبار_علوم_الأرض.html', {type:'text/html'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file], title:'اختبار علوم الأرض التفاعلي', text:'اختبار تفاعلي في علوم الأرض من أ. خالد عادل'});
    }catch(err){ /* user cancelled the share sheet, ignore */ }
  } else {
    alert('المتصفح ده مش بيدعم المشاركة المباشرة للملفات. هنزّل الملف بدل كده وابعته يدوي من واتساب.');
    document.getElementById('saveBtn').click();
  }
};

buildTabs();
loadModel(0);
</script>
